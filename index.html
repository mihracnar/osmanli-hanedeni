<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Osmanlı Hanedanı — Soy Ağacı</title>
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNiIgZmlsbD0iIzBhMWIzNiIvPgogIDx0ZXh0IHg9IjE2IiB5PSIyMiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1zaXplPSIxOCIgZm9udC1mYW1pbHk9InNlcmlmIiBmaWxsPSIjNkJCNEMyIj7imZg8L3RleHQ+Cjwvc3ZnPg==">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPBAR -->
<header id="topbar">
  <h1>Osmanlı Hanedanı — Soy Ağacı</h1>
</header>

<!-- SOL: Figür Timeline Paneli -->
<div id="fig-panel">
  <!-- Dönem renk şeridi (en sol 5px) -->
  <div id="fig-period-strip"></div>
  <!-- Zaman ekseni (yıl etiketleri) -->
  <div id="fig-axis"><div id="fig-axis-inner"></div></div>
  <!-- Bar alanı -->
  <div id="fig-bars-wrap">
    <div id="fig-panel-hdr">Dönemin Önemli Figürleri</div>
    <div id="fig-bars"></div>
  </div>
</div>

<!-- CANVAS -->
<div id="myDiagramDiv"></div>

<!-- SAĞ: ZOOM KONTROLLER -->
<div id="zoom-controls">
  <button class="zc-btn" id="btnZoomIn"  title="Yakınlaş">＋</button>
  <button class="zc-btn" id="btnFit"     title="Sığdır">⊡</button>
  <button class="zc-btn" id="btnZoomOut" title="Uzaklaş">－</button>
  <div class="zc-divider"></div>
  <button class="zc-btn zc-toggle active" id="btnToggleMinimap" title="Mini harita">▣</button>
</div>

<!-- SAĞ: MİNİMAP -->
<div id="minimap-wrap">
  <div id="minimap-header"><span id="minimap-title">Harita</span></div>
  <div id="minimap"></div>
</div>

<!-- SAĞ ALT: LEJANT -->
<div id="legend">
  <div class="panel-header" id="btnToggleLegend">
    <span>Lejant</span><span class="panel-arrow">▾</span>
  </div>
  <div class="panel-body leg-body">
    <div class="leg-section">Saltanat geçişleri</div>
    <div class="leg"><div class="leg-line" style="background:#4AAF9A"></div> Oğul</div>
    <div class="leg"><div class="leg-line leg-dash" style="color:#6BB4C2"></div> Kardeş</div>
    <div class="leg"><div class="leg-line leg-dash" style="color:#D4735A"></div> İsyan</div>
    <div class="leg"><div class="leg-line leg-dash" style="color:#C8B86A"></div> Fetret</div>
    <div class="leg-section" style="margin-top:7px">Önemli Figürler</div>
    <div class="leg"><div class="leg-dot" style="background:#C8B86A"></div> Veziriazam / Sadrazam</div>
    <div class="leg"><div class="leg-dot" style="background:#4AAF9A"></div> Şeyhülislam</div>
    <div class="leg"><div class="leg-dot" style="background:#6BB4C2"></div> Kaptan-ı Derya</div>
    <div class="leg"><div class="leg-dot" style="background:#B87AAE"></div> Mimar</div>
    <div class="leg"><div class="leg-dot" style="background:#9FB8C4"></div> Bilgin / Sanatçı</div>
    <div class="leg"><div class="leg-dot" style="background:#D4735A"></div> İsyancı</div>
  </div>
</div>

<!-- SAĞ ÜST: FİLTRELER -->
<div id="filter-panel">
  <div class="panel-header" id="btnToggleFilters">
    <span>Filtreler</span><span class="panel-arrow">▾</span>
  </div>
  <div class="panel-body fp-body">
    <div class="fp-section">
      <div class="fp-title">Katman</div>
      <label class="fp-chk"><input type="checkbox" id="togSucc" checked><span>Saltanat geçişleri</span></label>
      <label class="fp-chk"><input type="checkbox" id="togEs"   checked><span>Eşler</span></label>
      <label class="fp-chk"><input type="checkbox" id="togSeh"  checked><span>Şehzadeler</span></label>
    </div>
    <div class="fp-sep"></div>
    <div class="fp-section">
      <div class="fp-title">Geçiş tipi</div>
      <label class="fp-chk"><input type="checkbox" data-succ="ogul"   checked>
        <span class="fp-dot" style="background:#4AAF9A"></span><span>Oğul</span></label>
      <label class="fp-chk"><input type="checkbox" data-succ="erkek"  checked>
        <span class="fp-dot" style="background:#6BB4C2"></span><span>Kardeş</span></label>
      <label class="fp-chk"><input type="checkbox" data-succ="isyan"  checked>
        <span class="fp-dot" style="background:#D4735A"></span><span>İsyan</span></label>
      <label class="fp-chk"><input type="checkbox" data-succ="fetret" checked>
        <span class="fp-dot" style="background:#C8B86A"></span><span>Fetret</span></label>
    </div>
    <div class="fp-sep"></div>
    <div class="fp-section">
      <div class="fp-title">Dönem</div>
      <label class="fp-chk"><input type="checkbox" data-period="kuruluş"   checked>
        <span class="fp-dot" style="background:#6BB4C2"></span><span>Kuruluş</span></label>
      <label class="fp-chk"><input type="checkbox" data-period="yükseliş"  checked>
        <span class="fp-dot" style="background:#4AAF9A"></span><span>Yükseliş</span></label>
      <label class="fp-chk"><input type="checkbox" data-period="duraklama" checked>
        <span class="fp-dot" style="background:#C8B86A"></span><span>Duraklama</span></label>
      <label class="fp-chk"><input type="checkbox" data-period="gerileme"  checked>
        <span class="fp-dot" style="background:#C4895A"></span><span>Gerileme</span></label>
      <label class="fp-chk"><input type="checkbox" data-period="çöküş"     checked>
        <span class="fp-dot" style="background:#B87AAE"></span><span>Son Dönem</span></label>
    </div>
  </div>
</div>

<!-- DETAY PANELİ -->
<div id="detail" class="hidden">
  <button id="detailClose">✕</button>
  <div id="detailBody"></div>
</div>

<!-- Figür tooltip -->
<div id="fig-tooltip">
  <div class="tt-role"></div>
  <div class="tt-name"></div>
  <div class="tt-years"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gojs@2.3.18/release/go.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
